<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#6366f1"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="ЛогосПеревірка"/>
<title>ЛогосПеревірка</title>
<link rel="manifest" href="manifest.json"/>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#07070f;--sur:#0d0d1e;--bdr:#1a1a32;--bdr2:#13132a;
  --acc:#6366f1;--acc2:#0ea5e9;--txt:#dde0f0;--mut:#aaaacc;
  --dim:#44446a;--dim2:#2a2a44;
  --grn:#4ade80;--ylw:#f59e0b;--red:#f87171;--orn:#f97316;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--txt);
  font-family:'Raleway',sans-serif;-webkit-font-smoothing:antialiased;overscroll-behavior:none}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--dim2);border-radius:3px}
input,textarea,button,select{font-family:inherit}
textarea{resize:none} textarea:focus,input:focus{outline:none} button{cursor:pointer;border:none;background:none}

/* LAYOUT */
#app{display:flex;flex-direction:column;height:100dvh}
header{
  padding:calc(var(--safe-top)+10px) 16px 10px;
  background:rgba(7,7,15,.97);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--bdr2);display:flex;align-items:center;gap:12px;
  flex-shrink:0;position:sticky;top:0;z-index:100
}
.logo{width:38px;height:38px;border-radius:10px;flex-shrink:0;
  background:linear-gradient(135deg,var(--acc),var(--acc2));
  display:flex;align-items:center;justify-content:center;font-size:19px;
  box-shadow:0 0 16px rgba(99,102,241,.4)}
.logo-t{font-size:15px;font-weight:700;color:#fff;letter-spacing:-.3px}
.logo-s{font-size:10px;color:var(--dim);font-family:'JetBrains Mono',monospace;margin-top:1px}
main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 13px 6px}
nav{padding:6px 0 calc(var(--safe-bot)+4px);background:rgba(13,13,30,.97);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-top:1px solid var(--bdr2);display:flex;flex-shrink:0}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 2px;
  color:var(--dim);font-size:9.5px;font-weight:600;transition:color .15s;
  -webkit-tap-highlight-color:transparent;position:relative}
.nb.on{color:#a5b4fc} .nb .ni{font-size:18px;line-height:1}
.bdg{position:absolute;top:0;right:calc(50% - 16px);background:var(--acc);color:#fff;
  border-radius:8px;font-size:9px;padding:1px 4px;font-family:'JetBrains Mono',monospace;min-width:16px;text-align:center}

/* CARDS & COMMON */
.card{background:var(--sur);border:1px solid var(--bdr);border-radius:14px;overflow:hidden;margin-bottom:12px}
.card-hdr{padding:9px 13px;background:#0a0a18;border-bottom:1px solid var(--bdr2);display:flex;align-items:center;gap:8px}
.lbl{font-size:10px;color:var(--dim);font-family:'JetBrains Mono',monospace;letter-spacing:1px}
.lbl.acc{color:var(--acc)} .lbl.grn{color:var(--grn)} .lbl.red{color:var(--red)} .lbl.ylw{color:var(--ylw)} .lbl.orn{color:var(--orn)}
.card-body{padding:13px}
.card-ftr{padding:10px 13px;background:#0a0a18;border-top:1px solid var(--bdr2);display:flex;justify-content:flex-end;gap:8px}

/* BUTTONS */
.btn{padding:9px 18px;border-radius:10px;font-size:13px;font-weight:600;transition:opacity .15s,transform .1s;-webkit-tap-highlight-color:transparent}
.btn:active{transform:scale(.97)} .btn:disabled{opacity:.4;transform:none}
.btn-primary{background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;box-shadow:0 3px 16px rgba(99,102,241,.35)}
.btn-ghost{background:rgba(99,102,241,.12);border:1px solid rgba(99,102,241,.3);color:#a5b4fc}
.btn-red{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#fca5a5}
.btn-grn{background:rgba(74,222,128,.12);border:1px solid rgba(74,222,128,.3);color:#86efac}
.btn-full{width:100%}
.btn-sm{padding:7px 13px;font-size:12px}

/* SOURCE TABS */
.src-row{display:flex;gap:7px;margin-bottom:12px}
.src-tab{flex:1;padding:9px 4px;border:1px solid var(--bdr);border-radius:9px;color:var(--dim);
  font-size:11px;font-weight:600;text-align:center;transition:all .15s;-webkit-tap-highlight-color:transparent}
.src-tab.on{background:rgba(99,102,241,.14);border-color:var(--acc);color:#a5b4fc}
.src-tab .si{font-size:16px;display:block;margin-bottom:3px}

/* TEXTAREA */
textarea{width:100%;min-height:120px;background:transparent;border:none;
  padding:13px 14px;color:#c0c0da;font-size:13.5px;line-height:1.75;font-family:'JetBrains Mono',monospace}

/* CRITERIA */
.criteria-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:13px}
.crit-item{display:flex;align-items:flex-start;gap:9px;padding:10px 11px;
  background:var(--bdr2);border-radius:10px;border:1px solid transparent;
  cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent}
.crit-item.on{background:rgba(99,102,241,.1);border-color:rgba(99,102,241,.3)}
.crit-ico{font-size:18px;flex-shrink:0;margin-top:1px}
.crit-name{font-size:12px;font-weight:600;color:var(--txt);line-height:1.3}
.crit-desc{font-size:10px;color:var(--dim);margin-top:2px;line-height:1.3}
.crit-cb{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--dim2);
  background:transparent;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center}
.crit-cb.on{background:var(--acc);border-color:var(--acc)}

/* MIC / RECORDING */
.mic-panel{padding:16px 13px;text-align:center}
.mic-btn{width:72px;height:72px;border-radius:50%;margin:0 auto 14px;display:flex;align-items:center;
  justify-content:center;font-size:28px;transition:all .2s;-webkit-tap-highlight-color:transparent;
  border:3px solid var(--bdr)}
.mic-btn.idle{background:var(--sur);border-color:var(--bdr)}
.mic-btn.rec{background:rgba(239,68,68,.2);border-color:var(--red);animation:recpulse 1.2s infinite}
.mic-status{font-size:13px;color:var(--mut);margin-bottom:6px}
.mic-timer{font-size:22px;font-weight:700;color:#fff;font-family:'JetBrains Mono',monospace;margin-bottom:8px}
.mic-hint{font-size:11px;color:var(--dim);font-family:'JetBrains Mono',monospace}

/* AUDIO VIZ */
.viz-wrap{height:48px;background:var(--bdr2);border-radius:10px;margin:0 13px 12px;overflow:hidden;position:relative}
#vizCanvas{width:100%;height:100%;display:block}
.viz-label{position:absolute;top:4px;right:8px;font-size:9px;color:var(--dim);font-family:'JetBrains Mono',monospace}

/* VOICE METRICS */
.metrics-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 13px 13px}
.metric{background:var(--bdr2);border-radius:10px;padding:10px 8px;text-align:center}
.metric-v{font-size:20px;font-weight:700;font-family:'JetBrains Mono',monospace}
.metric-l{font-size:9px;color:var(--dim);margin-top:3px;font-family:'JetBrains Mono',monospace;letter-spacing:.5px}
.metric-bar{height:2px;background:var(--bdr);border-radius:2px;margin-top:6px}
.metric-fill{height:100%;border-radius:2px;transition:width .5s}

/* TRUST INDEX */
.trust-panel{padding:16px 13px;text-align:center}
.trust-ring{width:110px;height:110px;margin:0 auto 12px;position:relative}
.trust-ring svg{width:100%;height:100%;transform:rotate(-90deg)}
.trust-score{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:26px;font-weight:700;font-family:'Raleway',sans-serif}
.trust-label{font-size:10px;color:var(--dim);font-family:'JetBrains Mono',monospace;letter-spacing:.8px}
.trust-breakdown{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:13px}
.tb-item{background:var(--bdr2);border-radius:9px;padding:9px 10px}
.tb-name{font-size:11px;color:var(--mut);margin-bottom:5px}
.tb-bar{height:3px;background:var(--bdr);border-radius:2px}
.tb-fill{height:100%;border-radius:2px;transition:width 1s}
.tb-val{font-size:11px;font-weight:600;font-family:'JetBrains Mono',monospace;margin-top:4px}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:12px}
.stat{background:var(--sur);border:1px solid var(--bdr);border-radius:13px;padding:14px 9px;text-align:center}
.stat-v{font-size:28px;font-weight:700;font-family:'Raleway',sans-serif}
.stat-l{font-size:9px;color:var(--dim);margin-top:3px;font-family:'JetBrains Mono',monospace;letter-spacing:.5px}
.stat-bar{margin-top:7px;height:2px;background:var(--bdr);border-radius:2px}
.stat-fill{height:100%;border-radius:2px;transition:width 1.1s}

/* SUMMARY */
.summ{background:rgba(99,102,241,.07);border:1px solid rgba(99,102,241,.22);
  border-radius:13px;padding:13px 15px;margin-bottom:12px}
.summ-lbl{font-size:9px;color:var(--acc);margin-bottom:6px;font-family:'JetBrains Mono',monospace;letter-spacing:1px}
.summ-txt{font-size:13.5px;color:#c0c0da;line-height:1.75}

/* RESULT CARDS */
.rcard{border-radius:13px;padding:14px;margin-bottom:9px;
  border-left-width:3px;border-left-style:solid;
  border-top:1px solid var(--bdr);border-right:1px solid var(--bdr);border-bottom:1px solid var(--bdr);background:var(--sur)}
.rcard-head{display:flex;justify-content:space-between;align-items:flex-start;gap:9px;margin-bottom:10px}
.rcard-title{font-size:13.5px;font-weight:700;color:#e8e8f4}
.rcard-sub{font-size:10.5px;color:var(--dim);margin-top:2px;font-family:'JetBrains Mono',monospace}
.sev-tag{font-size:9px;padding:2px 7px;border-radius:5px;font-weight:700;letter-spacing:.4px;
  flex-shrink:0;font-family:'JetBrains Mono',monospace}
.quote{background:var(--bdr2);border-radius:7px;padding:9px 11px;margin-bottom:9px;
  font-size:12px;color:#8888a8;font-style:italic;line-height:1.6;border-left:2px solid var(--dim2)}
.rcard-txt{font-size:12.5px;color:var(--mut);line-height:1.75;margin-bottom:9px}
.rcard-links{display:flex;gap:11px;flex-wrap:wrap}
.rlink{font-size:11px;color:var(--acc);text-decoration:none;font-family:'JetBrains Mono',monospace}
.rlink.d{color:var(--dim)}

/* FACTS */
.fclaim{font-size:13px;color:#c0c0da;line-height:1.7;margin-bottom:11px}
.vbox{border-radius:9px;padding:11px 13px}
.vrow{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;flex-wrap:wrap;gap:5px}
.vlbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;font-family:'JetBrains Mono',monospace}
.stag{font-size:9.5px;color:var(--dim);background:var(--bdr2);padding:2px 7px;border-radius:4px;font-family:'JetBrains Mono',monospace}
.vtxt{font-size:12.5px;color:var(--mut);line-height:1.6}
.fact-acts{display:flex;gap:9px;align-items:center;flex-wrap:wrap;margin-top:2px}
.ext-lnk{font-size:11px;color:var(--dim);text-decoration:none;font-family:'JetBrains Mono',monospace}

/* SECTION */
.sec{background:var(--sur);border:1px solid var(--bdr);border-radius:13px;padding:13px 14px;margin-bottom:9px}
.sec-lbl{font-size:9px;color:var(--dim);font-family:'JetBrains Mono',monospace;letter-spacing:1px;margin-bottom:10px}
.plus-i,.rec-i{display:flex;gap:9px;font-size:13px;color:var(--mut);line-height:1.7;margin-bottom:7px}
.plus-m{color:var(--grn);flex-shrink:0} .rec-m{color:#38bdf8;flex-shrink:0}
.tag{display:inline-block;font-size:10.5px;padding:3px 9px;border-radius:6px;
  font-family:'JetBrains Mono',monospace;font-weight:600;margin:3px}

/* YOUTUBE */
.yt-input{width:100%;background:var(--bdr2);border:1px solid var(--bdr);border-radius:10px;
  padding:11px 13px;color:var(--txt);font-size:13px;font-family:'JetBrains Mono',monospace}
.yt-input:focus{border-color:var(--acc)} .yt-input::placeholder{color:var(--dim)}
.yt-thumb{margin-top:9px;border-radius:9px;overflow:hidden;border:1px solid var(--bdr)}
.yt-thumb img{width:100%;display:block}
.yt-meta{padding:6px 11px;font-size:11px;color:var(--mut);background:var(--bdr2);font-family:'JetBrains Mono',monospace}

/* UPLOAD */
.upz{border:2px dashed var(--bdr);border-radius:11px;padding:26px 18px;text-align:center;
  cursor:pointer;transition:border-color .2s,background .2s;-webkit-tap-highlight-color:transparent}
.upz:active{border-color:var(--acc);background:rgba(99,102,241,.05)}
.upz-ico{font-size:30px;margin-bottom:9px} .upz-txt{font-size:13px;color:var(--mut);line-height:1.5}
.upz-hint{font-size:11px;color:var(--dim);margin-top:5px;font-family:'JetBrains Mono',monospace}

/* WHATSAPP SHARE */
.wa-panel{background:rgba(37,211,102,.08);border:1px solid rgba(37,211,102,.25);
  border-radius:13px;padding:13px 14px;margin-bottom:12px}
.wa-row{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.wa-ico{font-size:22px} .wa-title{font-size:13px;font-weight:700;color:#86efac}
.wa-desc{font-size:12px;color:var(--mut);line-height:1.5;margin-bottom:10px}
.wa-btns{display:flex;gap:8px;flex-wrap:wrap}

/* INSTALL BANNER */
.inst-banner{display:flex;align-items:center;gap:10px;background:rgba(99,102,241,.1);
  border:1px solid rgba(99,102,241,.25);border-radius:12px;padding:11px 13px;margin-bottom:13px}
.inst-text{font-size:12px;color:var(--mut);line-height:1.5;flex:1}
.inst-btn{padding:7px 12px;background:var(--acc);color:#fff;border-radius:7px;font-size:12px;font-weight:700;flex-shrink:0}
.inst-x{color:var(--dim);font-size:20px;padding:0 3px}

/* LOADING */
.loading{display:flex;flex-direction:column;align-items:center;padding:55px 20px}
.spin{font-size:40px;animation:pulse 1.5s infinite;margin-bottom:14px}
.stage-txt{font-size:12.5px;color:var(--dim);font-family:'JetBrains Mono',monospace;text-align:center}
.prog{width:190px;height:2px;background:var(--bdr);border-radius:2px;margin-top:12px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2));animation:proganim 2s ease-in-out infinite}

/* EMPTY / OK */
.ok-state{text-align:center;padding:42px 0;font-size:14px;color:var(--grn)}
.empty{text-align:center;padding:55px 20px;color:var(--dim2)}
.empty-ico{font-size:44px;opacity:.2;margin-bottom:13px}
.empty-txt{font-size:14px;color:var(--dim2);margin-bottom:5px}
.empty-hint{font-size:11px;color:#1a1a28;font-family:'JetBrains Mono',monospace}
.err{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);border-radius:11px;
  padding:11px 14px;margin-bottom:12px;font-size:13px;color:#fca5a5}

/* TRANSCRIPT */
.tr-lbl{font-size:9px;color:var(--acc);letter-spacing:1px;margin-bottom:5px;font-family:'JetBrains Mono',monospace}
.tr-box{background:var(--bdr2);border-radius:9px;padding:10px 12px;margin-bottom:12px;
  font-size:11.5px;color:var(--dim);line-height:1.7;font-family:'JetBrains Mono',monospace;
  max-height:100px;overflow-y:auto}

/* VOICE ALERT */
.va-row{display:flex;align-items:center;gap:9px;background:var(--bdr2);border-radius:9px;padding:10px 12px;margin-bottom:8px}
.va-ico{font-size:18px;flex-shrink:0}
.va-txt{font-size:12px;color:var(--mut);flex:1;line-height:1.4}
.va-btn{padding:5px 11px;background:rgba(99,102,241,.15);border:1px solid rgba(99,102,241,.3);
  color:#a5b4fc;border-radius:7px;font-size:11px;font-family:'JetBrains Mono',monospace;flex-shrink:0}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes recpulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.4)}70%{box-shadow:0 0 0 12px rgba(239,68,68,0)}}
@keyframes proganim{0%{width:0}50%{width:70%}100%{width:100%}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fadeUp .3s ease forwards}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">⚖</div>
    <div><div class="logo-t">ЛогосПеревірка</div><div class="logo-s">логіка · брехня · маніпуляції</div></div>
    <div id="hdr-right" style="margin-left:auto;display:flex;gap:6px;align-items:center">
    <button onclick="showApiKeyScreen()" style="background:rgba(99,102,241,0.15);border:1px solid rgba(99,102,241,0.3);color:#a5b4fc;border-radius:7px;padding:5px 10px;font-size:11px;cursor:pointer">🔑 Ключ</button>
  </div>
  </header>
  <main id="main"></main>
  <nav id="nav"></nav>
</div>
<script>
// ═══════════════════════════════════════
//  STATE
// ═══════════════════════════════════════
const S = {
  tab:'input',
  srcType:'text',      // text | mic | file | youtube
  text:'',
  ytURL:'',ytId:'',
  transcript:'',
  audioBlob:null,audioURL:'',
  fileBlob:null,fileURL:'',fileName:'',
  recording:false,
  recSec:0,recTimer:null,
  mediaRec:null,audioChunks:[],
  audioCtx:null,analyser:null,animId:null,
  // voice metrics (live)
  vm:{pitch:0,tempo:0,volume:0,pauses:0,tremor:0},
  vmHistory:[],
  criteria:{
    logic:true, manip:true, facts:true, lies:true,
    voice:true, patterns:true, emotional:true, verbal:true
  },
  loading:false,stage:'',
  result:null,trustScore:0,trustBreakdown:{},
  voiceMetrics:null,
  facts:{},
  error:'',
  installEv:null,showBanner:false,
  speechEnabled:true,
};

// ═══════════════════════════════════════
//  CRITERIA CONFIG
// ═══════════════════════════════════════
const CRITERIA = [
  {id:'logic',    ico:'🧠', name:'Логіка',          desc:'Логічні помилки та суперечності'},
  {id:'manip',    ico:'🎭', name:'Маніпуляції',      desc:'Техніки впливу та маніпуляції'},
  {id:'facts',    ico:'🔍', name:'Факти',            desc:'Перевірка фактичних тверджень'},
  {id:'lies',     ico:'🔴', name:'Брехня',           desc:'Ознаки неправди в тексті'},
  {id:'verbal',   ico:'💬', name:'Вербальні знаки',  desc:'Слова-маркери брехні та ухилення'},
  {id:'emotional',ico:'❤️', name:'Емоц. маніпуляція',desc:'Шантаж, провина, страх, тиск'},
  {id:'patterns', ico:'🧩', name:'Психопатерни',     desc:'DARVO, газлайтинг, трикутник'},
  {id:'voice',    ico:'🎵', name:'Голос (тембр)',    desc:'Аналіз pitch, темпу, тремору'},
];

// ═══════════════════════════════════════
//  SYSTEM PROMPTS
// ═══════════════════════════════════════
function buildPrompt() {
  const active = CRITERIA.filter(c=>S.criteria[c.id]).map(c=>c.name).join(', ');
  return `Ти — провідний експерт з психології, детекції брехні, логіки та маніпуляцій. Відповідай ВИКЛЮЧНО українською мовою.
Активні критерії аналізу: ${active}.
Повертай ЛИШЕ валідний JSON без markdown:
{
  "загальна_оцінка": 0–100,
  "індекс_довіри": 0–100,
  "достовірність": "висока"|"середня"|"низька",
  "резюме": "2–3 речення",
  "ознаки_брехні": [{"ознака":"...","цитата":"...","пояснення":"...","серйозність":"критична"|"висока"|"середня"|"низька"}],
  "логічні_помилки": [{"назва":"...","назва_латиною":"...","серйозність":"критична"|"висока"|"середня"|"низька","цитата":"...","пояснення":"...","пошук":"english"}],

function h(tag,props,...children){
  const el=document.createElement(tag);
  if(props)Object.entries(props).forEach(([k,v])=>{
    if(k==='style'&&typeof v==='object')Object.assign(el.style,v);
    else if(k.startsWith('on'))el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='className')el.className=v;
    else el.setAttribute(k,v);
  });
  children.flat(Infinity).forEach(c=>{
    if(c==null||c===false)return;
    el.appendChild(typeof c==='string'||typeof c==='number'?document.createTextNode(c):c);
  });
  return el;
}

async function callClaude(system,userMsg,useSearch=false,maxTok=5000){
  const body={model:'claude-sonnet-4-20250514',max_tokens:maxTok,system,messages:[{role:'user',content:userMsg}]};
  if(useSearch)body.tools=[{type:'web_search_20250305',name:'web_search'}];
  const apiKey=localStorage.getItem('logos_api_key')||'';
  const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{
    'Content-Type':'application/json',
    'x-api-key':apiKey,
    'anthropic-version':'2023-06-01',
    'anthropic-dangerous-direct-browser-access':'true'
  },body:JSON.stringify(body)});
  if(!r.ok)throw new Error('API '+r.status);
  const d=await r.json();
  return (d.content||[]).map(b=>b.type==='text'?b.text:'').join('');
}

function parseJSON(raw){
  const c=raw.replace(/```json\s*/g,'').replace(/```\s*/g,'').trim();
  const s=c.indexOf('{'),e=c.lastIndexOf('}');
  if(s===-1||e===-1)throw new Error('No JSON');
  return JSON.parse(c.slice(s,e+1));
}

function speak(text){
  if(!S.speechEnabled||!('speechSynthesis' in window))return;
  window.speechSynthesis.cancel();
  const utt=new SpeechSynthesisUtterance(text);
  utt.lang='uk-UA'; utt.rate=0.95; utt.pitch=1;
  // prefer Ukrainian voice if available
  const voices=window.speechSynthesis.getVoices();
  const ukVoice=voices.find(v=>v.lang.startsWith('uk'))||voices.find(v=>v.lang.startsWith('ru'))||null;
  if(ukVoice)utt.voice=ukVoice;
  window.speechSynthesis.speak(utt);
}

function speakResult(result){
  if(!result)return;
  const trust=result.індекс_довіри||0;
  const lies=(result.ознаки_брехні||[]).length;
  const manip=(result.маніпулятивні_техніки||[]).length;
  let msg=`Аналіз завершено. Індекс довіри: ${trust} зі ста. `;
  if(trust<40)msg+='Виявлено високий рівень ризику. ';
  else if(trust<70)msg+='Виявлено помірний рівень ризику. ';
  else msg+='Рівень довіри прийнятний. ';
  if(lies>0)msg+=`Знайдено ${lies} ознак брехні. `;
  if(manip>0)msg+=`Знайдено ${manip} маніпулятивних технік. `;
  if(result.голосовий_висновок)msg+=result.голосовий_висновок;
  speak(msg);
}

let vizRaf=null;
function startViz(stream){
  const canvas=document.getElementById('vizCanvas');
  if(!canvas)return;
  const ctx2=canvas.getContext('2d');
  S.audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  S.analyser=S.audioCtx.createAnalyser();
  S.analyser.fftSize=256;
  const src=S.audioCtx.createMediaStreamSource(stream);
  src.connect(S.analyser);
  const buf=new Uint8Array(S.analyser.frequencyBinCount);
  let lastSilence=Date.now(),pauseCount=0;

  function draw(){
    vizRaf=requestAnimationFrame(draw);
    S.analyser.getByteFrequencyData(buf);
    const W=canvas.width=canvas.offsetWidth,H=canvas.height=canvas.offsetHeight;
    ctx2.fillStyle='#13132a'; ctx2.fillRect(0,0,W,H);
    // volume
    const vol=buf.reduce((a,b)=>a+b,0)/buf.length;
    S.vm.volume=Math.round(vol/2.55);
    // pitch estimate (dominant frequency bin)
    let maxBin=0,maxVal=0;
    for(let i=0;i<buf.length;i++){if(buf[i]>maxVal){maxVal=buf[i];maxBin=i;}}
    const nyq=S.audioCtx.sampleRate/2;
    const freq=maxBin*(nyq/S.analyser.frequencyBinCount);
    S.vm.pitch=Math.round(freq);
    // tremor: variance of recent volumes
    S.vmHistory.push(vol);
    if(S.vmHistory.length>20)S.vmHistory.shift();
    const mean=S.vmHistory.reduce((a,b)=>a+b,0)/S.vmHistory.length;
    const variance=S.vmHistory.reduce((a,b)=>a+(b-mean)**2,0)/S.vmHistory.length;
    S.vm.tremor=Math.min(100,Math.round(Math.sqrt(variance)/0.5));
    // pause detection
    if(vol<8){if(Date.now()-lastSilence>400){pauseCount++;lastSilence=Date.now();S.vm.pauses=pauseCount;}}
    else{lastSilence=Date.now();}
    // draw bars
    const bw=W/buf.length*2;
    for(let i=0;i<buf.length/2;i++){
      const bh=(buf[i]/255)*H;
      const hue=200+buf[i]/2;
      ctx2.fillStyle=`hsl(${hue},70%,55%)`;
      ctx2.fillRect(i*bw,H-bh,bw-1,bh);
    }
    updateMetrics();
  }
  draw();
}

function stopViz(){
  if(vizRaf)cancelAnimationFrame(vizRaf);
  if(S.audioCtx)S.audioCtx.close();
  S.analyser=null; S.audioCtx=null;
}

function updateMetrics(){
  const ids=['m-pitch','m-vol','m-tremor'];
  const vals=[
    {v:S.vm.pitch>0?S.vm.pitch+' Hz':'—', pct:Math.min(100,S.vm.pitch/3), c:S.vm.pitch>200&&S.vm.pitch<400?'#4ade80':S.vm.pitch>400?'#f59e0b':'#6b7280'},
    {v:S.vm.volume+'%', pct:S.vm.volume, c:cScore(100-S.vm.volume)},
    {v:S.vm.tremor+'%', pct:S.vm.tremor, c:S.vm.tremor>50?'#f87171':S.vm.tremor>25?'#f59e0b':'#4ade80'},
  ];
  ids.forEach((id,i)=>{
    const el=document.getElementById(id);
    if(el){el.querySelector('.metric-v').textContent=vals[i].v;
      el.querySelector('.metric-v').style.color=vals[i].c;
      el.querySelector('.metric-fill').style.width=vals[i].pct+'%';
      el.querySelector('.metric-fill').style.background=vals[i].c;}
  });
}

async function startRec(){
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true,video:false});
    S.audioChunks=[];
    const mimeType=['audio/webm;codecs=opus','audio/webm','audio/ogg','audio/mp4',''].find(t=>t===''||MediaRecorder.isTypeSupported(t));
    S.mediaRec=new MediaRecorder(stream,mimeType?{mimeType}:{});
    S.mediaRec.ondataavailable=e=>{if(e.data.size>0)S.audioChunks.push(e.data);};
    S.mediaRec.onstop=()=>{
      const blob=new Blob(S.audioChunks,{type:S.mediaRec.mimeType});
      S.audioBlob=blob; S.audioURL=URL.createObjectURL(blob);
      stream.getTracks().forEach(t=>t.stop());
      stopViz(); stopLiveTranscript();
      render();
    };
    S.mediaRec.start(100);
    S.recording=true; S.recSec=0;
    S.recTimer=setInterval(()=>{S.recSec++;updateTimer();},1000);
    render();
    setTimeout(()=>startViz(stream),100);
    startLiveTranscript();
  }catch(e){
    S.error='Немає доступу до мікрофону. Дозвольте доступ у налаштуваннях браузера.';
    render();
  }
}

function stopRec(){
  if(S.mediaRec&&S.mediaRec.state!=='inactive')S.mediaRec.stop();
  clearInterval(S.recTimer);
  S.recording=false;
  // Try live speech recognition transcript if available
  if(S.liveTranscript&&S.liveTranscript.trim()){
    S.transcript=S.liveTranscript.trim();
  }
}

// Live speech recognition during mic recording
let liveRecog=null;
function startLiveTranscript(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR)return;
  liveRecog=new SR();
  liveRecog.continuous=true; liveRecog.interimResults=true;
  liveRecog.lang='uk-UA';
  S.liveTranscript='';
  liveRecog.onresult=e=>{
    let final='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal)final+=e.results[i][0].transcript+' ';
    }
    S.liveTranscript+=final;
    // Update transcript display
    const tb=document.getElementById('live-tr');
    if(tb)tb.textContent=S.liveTranscript||(S.liveTranscript.length>0?S.liveTranscript:'Розпізнаю мову…');
  };
  liveRecog.onerror=()=>{};
  try{liveRecog.start();}catch(e){}
}
function stopLiveTranscript(){
  if(liveRecog)try{liveRecog.stop();}catch(e){}
  liveRecog=null;
}

function updateTimer(){
  const el=document.getElementById('rec-timer');
  if(el){const m=Math.floor(S.recSec/60),s=S.recSec%60;
    el.textContent=(m<10?'0':'')+m+':'+(s<10?'0':'')+s;}
}

async function doAnalyse(){
  S.loading=true;S.result=null;S.facts={};S.error='';S.tab='input';render();
  try{
    let txt=S.text.trim();
    if(S.srcType==='mic'||S.srcType==='file'){
      if(!S.audioBlob&&!S.fileBlob){S.error='Спочатку запишіть або завантажте аудіо.';S.loading=false;render();return;}
      S.stage='Транскрибую аудіо…';render();
      // Transcribe via Claude with audio description
      const blobToUse=S.audioBlob||S.fileBlob;
      const name=S.fileName||'запис.webm';
      txt=await transcribeAudio(blobToUse,name);
      S.transcript=txt;
    } else if(S.srcType==='youtube'){
      if(!S.ytId){S.error='Введіть коректне посилання YouTube.';S.loading=false;render();return;}
      S.stage='Отримую транскрипт YouTube…';render();
      try{
        const r=await callClaude(
          'Отримай транскрипт або основний зміст YouTube відео. Поверни лише текст без пояснень.',
          'YouTube відео: https://www.youtube.com/watch?v='+S.ytId,true,2000);
        txt=r.trim(); S.transcript=txt;
      }catch{txt='[YouTube відео: '+S.ytURL+']';}
    }
    if(!txt){S.error='Немає тексту для аналізу.';S.loading=false;render();return;}

    S.stage='Аналізую за критеріями…';render();
    const raw=await callClaude(buildPrompt(),'Проаналізуй:\n\n'+txt);
    S.result=parseJSON(raw);

    // compute trust score
    S.trustScore=S.result.індекс_довіри||Math.round(
      (S.result.загальна_оцінка||50)*0.5+
      (100-(S.result.ознаки_брехні||[]).length*10)*0.3+
      (100-(S.result.маніпулятивні_техніки||[]).length*8)*0.2
    );
    S.trustBreakdown=S.result.розбивка_довіри||{логіка:70,факти:70,щирість:70,емоції:70};

    // voice analysis of transcript
    if(S.criteria.voice&&txt.length>50){
      S.stage='Аналізую голосові маркери…';render();
      try{
        const vr=await callClaude(SYSTEM_VOICE,'Транскрипт:\n\n'+txt,false,800);
        S.voiceMetrics=parseJSON(vr);
      }catch{S.voiceMetrics=null;}
    }

    S.tab='overview';render();
    speakResult(S.result);

    // fact check first 3
    const claims=(S.result.фактичні_твердження||[]).slice(0,3);
    for(let i=0;i<claims.length;i++){
      S.stage='Перевіряю факт '+(i+1)+' з '+claims.length+'…';render();
      await doCheckFact(claims[i],i);
    }
    // alert critical items via voice
    const crits=[...(S.result.ознаки_брехні||[]),...(S.result.маніпулятивні_техніки||[])].filter(x=>x.серйозність==='критична');
    if(crits.length>0)speakAlert('Виявлено '+crits.length+' критичних проблем!');

  }catch(e){
    console.error(e);
    S.error='Помилка аналізу: '+e.message;
  }
  S.loading=false;S.stage='';render();
}

  });
}

function buildWAMessage(){
  if(!S.result)return'';
  const r=S.result;
  let msg='🔍 *ЛогосПеревірка — Результати аналізу*\n\n';
  msg+='⚖ Індекс довіри: *'+S.trustScore+'/100*\n';
  msg+='📊 Достовірність: *'+(r.достовірність||'—')+'*\n\n';
  if(r.резюме)msg+='📋 '+r.резюме+'\n\n';
  if((r.ознаки_брехні||[]).length>0){
    msg+='🔴 *Ознаки брехні:*\n';
    r.ознаки_брехні.slice(0,3).forEach(b=>msg+='• '+b.ознака+'\n');
    msg+='\n';
  }
  if((r.маніпулятивні_техніки||[]).length>0){
    msg+='⚡ *Маніпуляції:*\n';
    r.маніпулятивні_техніки.slice(0,3).forEach(m=>msg+='• '+m.техніка+'\n');
    msg+='\n';
  }
  msg+='_Аналіз виконано застосунком ЛогосПеревірка_';
  return msg;
}

  }

  if(!(r.ознаки_брехні?.length||r.маніпулятивні_техніки?.length||r.вербальні_маркери?.length||r.психологічні_патерни?.length))
    wrap.appendChild(h('div',{className:'ok-state'},'✓ Ознак брехні та маніпуляцій не виявлено'));

  return wrap;
}

// ─── LOGIC ──────────────────────────
function renderLogic(){
  if(!S.result)return emptyState('⚠','Ще немає результатів');
  const list=S.result.логічні_помилки||[];
  if(!list.length)return h('div',{className:'ok-state'},'✓ Логічних помилок не виявлено');
  const wrap=h('div',{className:'fu'});
  list.forEach(п=>{
    const c=cSev(п.серйозність);
    const card=h('div',{className:'rcard',style:{borderLeftColor:c}});
    const head=h('div',{className:'rcard-head'});
    const ti=h('div',{}); ti.appendChild(h('div',{className:'rcard-title'},п.назва||''));
    if(п.назва_латиною)ti.appendChild(h('div',{className:'rcard-sub'},п.назва_латиною));
    head.appendChild(ti);
    head.appendChild(h('span',{className:'sev-tag',style:{background:c+'18',color:c,border:'1px solid '+c+'44'}},(п.серйозність||'').toUpperCase()));
    card.appendChild(head);
    if(п.цитата)card.appendChild(h('div',{className:'quote'},'«'+п.цитата+'»'));
    card.appendChild(h('div',{className:'rcard-txt'},п.пояснення||''));
    const links=h('div',{className:'rcard-links'});
    links.appendChild(h('a',{className:'rlink',href:wUA(п.назва||''),target:'_blank',rel:'noreferrer'},'↗ Вікіпедія (УКР)'));
    if(п.назва_латиною)links.appendChild(h('a',{className:'rlink d',href:wEN(п.назва_латиною),target:'_blank',rel:'noreferrer'},'↗ Wikipedia (ENG)'));
    card.appendChild(links);
    wrap.appendChild(card);
  });
  return wrap;
}

// ─── FACTS ──────────────────────────
function renderFacts(){
  if(!S.result)return emptyState('🔍','Ще немає результатів');
  const list=S.result.фактичні_твердження||[];
  if(!list.length)return h('div',{className:'ok-state',style:{color:'var(--dim)'}},'Фактичних тверджень не знайдено');
  const wrap=h('div',{className:'fu'});
  list.forEach((т,і)=>{
    const fr=S.facts[і]; const vc=cVer(fr?.вердикт);
    const card=h('div',{className:'rcard',style:{borderLeftColor:fr?vc:'var(--bdr)'}});
    card.appendChild(h('div',{className:'lbl d',style:{display:'block',marginBottom:'4px'}},'#'+(і+1)));
    card.appendChild(h('div',{className:'fclaim'},т.твердження||''));
    if(т.впевненість!==undefined){
      const cb=h('div',{style:{height:'2px',background:'var(--bdr)',borderRadius:'2px',marginBottom:'11px'}});
      const cf=h('div',{style:{height:'100%',width:'0%',background:cVer(т.вердикт),borderRadius:'2px',transition:'width 1s'}});
      cb.appendChild(cf); card.appendChild(cb); setTimeout(()=>cf.style.width=т.впевненість+'%',50);
    }
    if(fr){
      const vb=h('div',{className:'vbox',style:{background:vc+'0e',border:'1px solid '+vc+'33'}});
      const vr=h('div',{className:'vrow'});
      vr.appendChild(h('span',{className:'vlbl',style:{color:vc}},fr.вердикт||''));
      const srcs=h('div',{style:{display:'flex',gap:'4px',flexWrap:'wrap'}});
      (fr.джерела||[]).slice(0,2).forEach(д=>srcs.appendChild(h('span',{className:'stag'},д)));
      vr.appendChild(srcs); vb.appendChild(vr);
      vb.appendChild(h('div',{className:'vtxt'},fr.пояснення||''));
      card.appendChild(vb);
    }else{
      const acts=h('div',{className:'fact-acts'});
      if(і<3)acts.appendChild(h('span',{style:{animation:'pulse 1.5s infinite',fontSize:'11px',color:'var(--dim)',fontFamily:'JetBrains Mono,monospace'}},'⟳ Перевіряється…'));
      else acts.appendChild(h('button',{className:'btn btn-ghost btn-sm',onClick:()=>doCheckFact(т,і)},'↗ Перевірити'));
      acts.appendChild(h('a',{className:'ext-lnk',href:gS(т.пошук||т.твердження||''),target:'_blank',rel:'noreferrer'},'Google →'));
      acts.appendChild(h('a',{className:'ext-lnk',href:wUA(т.твердження||''),target:'_blank',rel:'noreferrer'},'Вікіпедія →'));
      card.appendChild(acts);
    }
    wrap.appendChild(card);
  });
  return wrap;
}

function emptyState(ico,txt,hint){
  return h('div',{className:'empty'},h('div',{className:'empty-ico'},ico),h('div',{className:'empty-txt'},txt),
    hint?h('div',{className:'empty-hint'},hint):null);
}

// ═══════════════════════════════════════
//  PWA
// ═══════════════════════════════════════
async function doInstall(){
  if(!S.installEv)return;
  S.installEv.prompt(); await S.installEv.userChoice;
  S.showBanner=false;S.installEv=null;render();
}
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();S.installEv=e;S.showBanner=true;render();});
if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
window.speechSynthesis&&window.speechSynthesis.getVoices();

// ═══════════════════════════════════════
//  API KEY MANAGEMENT
// ═══════════════════════════════════════
function getApiKey(){return localStorage.getItem('logos_api_key')||'';}
function saveApiKey(k){localStorage.setItem('logos_api_key',k.trim());}

function showApiKeyScreen(){
  const main=document.getElementById('main');
  main.innerHTML='';
  const wrap=h('div',{style:{padding:'20px'}});
  wrap.appendChild(h('div',{style:{fontSize:'40px',textAlign:'center',marginBottom:'16px'}},'🔑'));
  wrap.appendChild(h('div',{style:{fontSize:'16px',fontWeight:'700',color:'#fff',textAlign:'center',marginBottom:'8px',fontFamily:"'Raleway',sans-serif"}},'Введіть API ключ'));
  wrap.appendChild(h('div',{style:{fontSize:'13px',color:'var(--mut)',textAlign:'center',marginBottom:'20px',lineHeight:'1.6'}},'Для роботи застосунку потрібен безкоштовний API ключ Anthropic'));

  const inp=h('input',{type:'password',placeholder:'sk-ant-api03-...',style:{
    width:'100%',background:'var(--bdr2)',border:'1px solid var(--bdr)',borderRadius:'10px',
    padding:'13px 14px',color:'var(--txt)',fontSize:'13px',fontFamily:"'JetBrains Mono',monospace",marginBottom:'10px'
  }});
  inp.value=getApiKey();
  wrap.appendChild(inp);

  wrap.appendChild(h('button',{
    className:'btn btn-primary btn-full',
    style:{marginBottom:'12px'},
    onClick:()=>{
      const k=inp.value.trim();
      if(!k.startsWith('sk-ant')){
        alert('Невірний ключ. Має починатись з sk-ant-...');return;
      }
      saveApiKey(k);
      render();
    }
  },'✅ Зберегти і продовжити'));

  wrap.appendChild(h('div',{style:{background:'rgba(99,102,241,0.08)',border:'1px solid rgba(99,102,241,0.2)',borderRadius:'10px',padding:'13px',fontSize:'12px',color:'var(--mut)',lineHeight:'1.6'}},[
    h('div',{style:{fontWeight:'700',color:'#a5b4fc',marginBottom:'6px'}},'Як отримати ключ:'),
    h('div',{},'1. Відкрийте console.anthropic.com'),
    h('div',{},'2. Зареєструйтесь → API Keys'),
    h('div',{},'3. Create Key → скопіюйте'),
    h('div',{},'4. Поповніть баланс від $5'),
    h('div',{style:{marginTop:'6px',color:'var(--dim)'}},'Один аналіз ≈ $0.01 (1 цент)'),
  ]));

  main.appendChild(wrap);
}

// ═══════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════
if(!getApiKey()){
  renderNav();
  showApiKeyScreen();
} else {
  render();
}
</script>
